name: Swing Trading Bot

on:
  schedule:
    # Runs every 4 hours: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 (UTC Time)
    - cron: '0 0,4,8,12,16,20 * * *'
  
  # Allows you to run the bot manually from GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Swing Bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
      run: |
        python swing_bot.py
